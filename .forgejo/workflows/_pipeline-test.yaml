on:
  push:

jobs:
  build-and-push-plugin:
    runs-on: alpine-node-lts
    #services:
    #  docker-dind:
    #    image: docker:dind
    #    options: --privileged
    #    env:
    #      DOCKER_TLS_CERTDIR: ""
    #    ports:
    #      - 2375:2375
    #    volumes:
    #      - "/workspace:/workspace"
    container:
      image: docker:dind
      options: --privileged
      env:
        DOCKER_TLS_CERTDIR: ""
    env:
      #_DOCKER_HOST_HOSTONLY: docker-dind
      #DOCKER_HOST: tcp://docker-dind:2375
      #PODMAN_USERNS: keep-ip
      DOCKER_HOST: unix:///var/lib/docker.sock
    steps:
      - name: Install dependencies
        run: apk add --no-cache git nodejs jq make go
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Start Docker daemon
        run: |
          dockerd-entrypoint.sh &
          
          for i in {1..30}; do
            if docker info >/dev/null 2>&1; then
              echo "Docker daemon ready"
              break
            fi
            echo "Waiting $i/30"
            sleep 2
          done
          
          # Check
          docker info
      - name: Download tools
        run: make download-tools GOTIFY_VERSION=v2.9.1
      #- name: DEBUG
      #  run: |
      #    echo "PWD: $(pwd)"
      #    echo "go path: $(go env GOPATH)"
      #    echo "list pwd without docker"
      #    ls -lah $(pwd)
      #    echo "list / in docker"
      #    docker run --rm -v "/:/app:ro" alpine ls -lah /app
      #    echo "List pwd with docker"
      #    docker run --rm -v $(pwd):/proj:ro alpine ls -lah /proj
      - name: Build
        run: |
          make build GOTIFY_VERSION=v2.9.1
